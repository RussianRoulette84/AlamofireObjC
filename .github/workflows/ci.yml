name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spm-test:
    name: SPM build & test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v

  platform-build:
    name: Build ${{ matrix.platform }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        platform: [iOS, tvOS, watchOS, macOS]
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app
      - name: Build for ${{ matrix.platform }}
        run: |
          xcodebuild build \
            -scheme AlamofireObjC \
            -destination "generic/platform=${{ matrix.platform }}" \
            -skipPackagePluginValidation | xcpretty || exit ${PIPESTATUS[0]}

  pod-lint:
    name: pod lib lint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app
      - name: Lint podspec
        run: pod lib lint AlamofireObjC.podspec --allow-warnings
